<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Choice KZ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">School Choice KZ</p>
      <h1>Find and compare private schools in Kazakhstan</h1>
      <p class="subtitle">Select up to three schools, then open the dedicated comparison page to review key decision factors side by side.</p>
    </div>
    <a class="compare-link" href="comparison.html" id="compare-link">Compare selected schools</a>
  </header>

  <main>
    <section class="toolbar" aria-live="polite">
      <strong id="selection-count">0 schools selected</strong>
      <span>Select up to 3 schools for comparison.</span>
    </section>

    <section class="school-grid" id="school-grid" aria-label="Available schools"></section>
  </main>

  <script src="schools.js"></script>
  <script src="app.js"></script>
</body>
</html>
